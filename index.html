<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Una Carta Especial</title>
    <!-- Premium Google Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=Playfair+Display:ital@0;1&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <!-- Welcome Screen -->
    <div id="welcome-screen" class="welcome-overlay">
        <div class="welcome-content glowable">
            <h1>Bienvenida de Nuevo</h1>
            <!-- <p>Toca para entrar y descubrir la magia</p> -->
            <button id="enter-btn">Entrar ✨</button>
        </div>
    </div>

    <!-- Background Containers -->
    <div id="bg-container">
        <div id="pattern-layer"></div>
    </div>

    <!-- Audios -->
    <audio id="bg-music" src="tu_musica_de_fondo.mp3" loop></audio>
    <audio id="easter-audio" src="tu_audio_sorpresa.mp4"></audio>
    <audio id="explanation-audio" src="tu_audio_explicacion.mp4"></audio>
    <audio id="long-audio" src="tu_audio_largo.mp4"></audio>

    <!-- Easter Egg Screen -->
    <div id="easter-egg-overlay" class="hidden">
        <div class="easter-content">
            <h1 class="easter-message">Lo unico que quiero es ayudarte y saber que estás feliz.</h1>
            <!-- <h2 class="easter-message">De: Fer... Tu Dosis de Amorts :3</h2> -->
            <div class="easter-buttons">
                <button id="play-easter-audio">🎵</button>
                <button id="close-easter-egg">Volver</button>
            </div>
            <button id="explanation-btn" class="easter-extra-btn" style="display: none;">Gracias</button>

            <!-- Long Audio UI -->
            <div class="long-audio-wrapper">
                <!-- <button id="play-long-audio" class="easter-extra-btn">🎧</button> -->
                <input type="range" id="long-audio-progress" class="audio-slider" min="0" max="100" value="0"
                    step="0.1">
            </div>
        </div>
    </div>

    <!-- Main Content -->
    <main class="content-wrapper">
        <div class="glowable header-text">
            <h1>LIZZY</h1>
            <!-- <p></p> -->
        </div>

        <button id="enable-motion" class="glowable">Activar Magia</button>
    </main>

    <!-- Modal for Random Phrases -->
    <div id="message-modal" class="modal-overlay hidden">
        <div class="modal-content">
            <p id="modal-text"></p>
            <button id="close-modal">Cerrar mensaje</button>
        </div>
    </div>

    <!-- Particle Canvas for Touch Feedback -->
    <canvas id="particles-canvas"></canvas>

    <script src="script.js"></script>
</body>

</html>
